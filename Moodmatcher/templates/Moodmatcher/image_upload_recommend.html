<!-- image_upload_recommend.html -->

{% extends 'base.html' %}

{% block title %}이미지 업로드 기반 추천{% endblock %}

{% block content %}
  <div class="container mt-5">
    <div class="card shadow p-4">
      <h2 class="text-dark">이미지 업로드를 통한 관광지 추천</h2>
      <p class="lead">자신이 좋아하는 이미지를 업로드하고 그에 맞는 관광지를 추천받아 보세요.</p>

      <form method="post" enctype="multipart/form-data" class="mt-3" id="imageUploadForm">
        {% csrf_token %}
        
        <div class="form-group">
          <label for="{{ form.your_image_field.id_for_label }}">이미지 업로드:</label>
          {{ form.as_p }}
        </div>
        
        <button type="button" class="btn btn-dark btn-sm mt-2" onclick="uploadImage()">업로드</button>
      </form>

      <div id="recommendedSpot" style="display: none;">
        <!-- 추천된 관광지 정보를 동적으로 표시할 부분 -->
        <h3 class="mt-4">추천된 관광지</h3>
        <p id="recommendedSpotInfo"></p>
      </div>
    </div>
  </div>

  <script>
    function uploadImage() {
      // FormData를 사용하여 이미지 업로드
      var formData = new FormData(document.getElementById('imageUploadForm'));
  
      // 이미지 업로드 AJAX 요청
      $.ajax({
          type: 'POST',
          url: '{% url "image_upload_recommend_result" %}',
          data: formData,
          processData: false,
          contentType: false,
          success: function (data) {
              // 추천된 관광지 정보를 동적으로 표시
              if (data.recommended_spots && data.recommended_spots.length > 0) {
                  document.getElementById('recommendedSpot').style.display = 'block';
                  document.getElementById('recommendedSpotInfo').innerHTML = data.recommended_spots[0].tourist_spot_name + ' - Top Keywords: ' + data.recommended_spots[0].top_keywords.join(', ');
              } else {
                  console.error('No recommended spots found in the returned data.');
              }
          },
          error: function (error) {
              console.error('Error during image upload:', error);
          }
      });
  }
  
</script>


{% endblock %}
